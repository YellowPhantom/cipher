<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cipher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="grid-bg"></div>

  <header>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span>Cipher</span>
    </div>
    <span class="tagline">PBKDF2-HMAC-SHA256 · 200k iterations · HMAC-authenticated</span>
  </header>

  <main>
    <!-- Key input -->
    <div class="card key-card">
      <label class="field-label" for="key-input">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        Secret Key
      </label>
      <div class="key-row">
        <input type="password" id="key-input" class="text-input" autocomplete="off" spellcheck="false"
          placeholder="Enter secret key…" value="YELLOWPHANTOM" />
        <button class="icon-btn" id="toggle-key" title="Show / hide key">
          <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-hide" class="hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="tab-bar">
      <button class="tab active" id="tab-encrypt">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Encrypt
      </button>
      <button class="tab" id="tab-decrypt">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
        Decrypt
      </button>
    </div>

    <!-- IO grid -->
    <div class="io-grid">
      <!-- Input -->
      <div class="card io-card">
        <div class="card-header">
          <span id="input-label">Plaintext</span>
          <span class="counter" id="input-counter">0 chars</span>
        </div>
        <textarea id="input-text" class="textarea" spellcheck="false"
          placeholder="Type your message here…"></textarea>
      </div>

      <!-- Process button -->
      <div class="process-col">
        <button class="process-btn" id="process-btn" title="Process (Ctrl+Enter)">
          <svg id="arrow-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
          <svg id="spinner-icon" class="spin hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-9-9"/>
          </svg>
        </button>
        <span class="hint">Ctrl+↵</span>
      </div>

      <!-- Output -->
      <div class="card io-card">
        <div class="card-header">
          <span id="output-label">Ciphertext</span>
          <div class="header-right">
            <span class="counter" id="output-counter">0 chars</span>
            <button class="copy-btn" id="copy-btn">
              <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <svg id="check-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Copy
            </button>
          </div>
        </div>
        <textarea id="output-text" class="textarea mono" readonly spellcheck="false"
          placeholder="Result will appear here…"></textarea>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar hidden"></div>
  </main>

<footer>
  Cipher uses PBKDF2-HMAC-SHA256 (200k iters) · SHA-256 keystream · HMAC-SHA256 auth tag
  <br />
  <span style="opacity: 0.45; font-size: 0.68rem;">Made by YellowPhantom364</span>
</footer>

  <script src="cipher.js"></script>
  <script src="app.js"></script>
</body>
</html>
